site_name: 数字泔水
site_url: https://eepsjo.github.io/Swill/
copyright: '&copy; 2023-2026 Espejo'

theme:
  language: zh
  name: material
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - awesome-pages
  - search
  - document-dates:
      position: top
      type: timeago
      date_format: '%y-%m-%d'

extra:
  generator: false
  robots: noindex, nofollow
  sitemap:
    filename: null

extra_javascript:
  - js/dune_quote.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js