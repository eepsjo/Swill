site_name: 找个班上吧
site_author: eepsjo
site_url: https://eepsjo.github.io/Swill/
copyright: '&copy; 你妈出生至今 - Espejo'

theme:
  name: material
  language: zh
  logo: assets/logo.png
  favicon: assets/logo.png
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - awesome-nav:
      filename: .nav
  - search
  - document-dates:
      position: top
      type: timeago
      date_format: '%y%m%d'    

extra:
  generator: false
  robots: noindex, nofollow
  sitemap:
    filename: null

extra_javascript:
  # - assets/0quote/dune.js
  - assets/0quote/kanna.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js